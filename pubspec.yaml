name: cardiac_app
description: Cardiac Symptom Self-Diagnosis & Lifestyle App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Firebase (Auth + Firestore as primary, Mongo via backend API)
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3

  # HTTP — calls your Flask/Node backend API
  http: ^1.1.0
  dio: ^5.4.0

  # Local notifications (reminders)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Maps (clinic locations)
  url_launcher: ^6.2.2

  # Charts (insights)
  fl_chart: ^0.66.0

  # Date/time picker
  flutter_datetime_picker_plus: ^2.1.0

  # Image picker (profile)
  image_picker: ^1.0.5

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/logo2.png
    - assets/images/onboarding.jpg
    - assets/images/onboarding2.jpg
